<!-- client.html -->
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>WS Chat Test (deviceToken)</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    input, button, textarea { margin: 4px 0; width: 100%; }
    .row { margin-bottom: 12px; }
  </style>
</head>
<body>
  <h3>WebSocket Chat Test (deviceToken)</h3>

  <div class="row">
    <label>WebSocket URL:</label>
    <input id="wsUrl" value="ws://localhost:8765" />
    <button id="connectBtn">Connect</button>
    <button id="disconnectBtn">Disconnect</button>
  </div>

  <div class="row">
    <button id="createChatBtn">Create Chat</button>
    <div>chatId: <span id="chatId">-</span></div>
    <div>deviceToken: <span id="deviceToken">-</span></div>
  </div>

  <hr/>

  <div>
    <h4>Send text message (no attachment)</h4>
    <textarea id="msgText" rows="3">Halo dari client</textarea>
    <button id="sendMsgBtn">Send Message</button>
  </div>

  <hr/>

  <div>
    <h4>Send message with attachment (single binary)</h4>
    <input type="file" id="fileInput" />
    <textarea id="msgWithFile" rows="2">Pesan dengan file</textarea>
    <button id="sendWithFileBtn">Send Message + File</button>
  </div>

  <hr/>

  <div>
    <h4>Server log</h4>
    <pre id="log" style="height:300px; overflow:auto; background:#f6f6f6; padding:8px;"></pre>
  </div>

<script>
let ws = null;
let currentChatId = null;

const logArea = document.getElementById("log");
function log(msg){
  const time = new Date().toLocaleTimeString();
  logArea.textContent += `[${time}] ${msg}\n`;
  logArea.scrollTop = logArea.scrollHeight;
}
function renderReply(htmlContent) {
  if (typeof htmlContent !== "string") return;

  const box = document.getElementById("replyBox");

  // clear isi lama (force refresh)
  box.innerHTML = "";

  // render reply baru
  box.innerHTML = htmlContent;

  // optional: scroll ke bawah jika konten panjang
  box.scrollTop = box.scrollHeight;
}


document.getElementById("connectBtn").onclick = () => {
  const url = document.getElementById("wsUrl").value;
  if (ws && ws.readyState === WebSocket.OPEN) {
    log("Already connected");
    return;
  }
  ws = new WebSocket(url);
  ws.binaryType = "arraybuffer";

  ws.onopen = () => {
    if (!localStorage.deviceToken) {
        ws.send(JSON.stringify({ action: "register_device" }));
    }
    log("WebSocket connected");
  };
  ws.onmessage = (ev) => {
    if (typeof ev.data === "string") {
      try {
        const d = JSON.parse(ev.data);
        log("RECV: " + JSON.stringify(d));

        // HANDLE HTML REPLY FROM BOT
        if ((d.action === "send_message" ||
      // false )&&
        d.action === "send_message_with_attachment") && 
        Object.prototype.hasOwnProperty.call(d, "reply") &&
        typeof d.reply === "string") {
          renderReply(d.reply);
        }

                // REGISTER DEVICE HANDLER
        if (d.action === "register_device") {
            localStorage.deviceToken = d.deviceToken;
            log("Saved deviceToken: " + localStorage.deviceToken);
            return; // selesai
        }

        if (d.action === "create_chat") {
          currentChatId = d.chatId;
          document.getElementById("chatId").textContent = currentChatId;
          document.getElementById("deviceToken").textContent = localStorage.deviceToken;
        }
        if (d.action === "ready_for_binary") {
          // handled in sendWithFile flow via event listener
        }
      } catch(e) {
        log("RECV text: " + ev.data);
      }
    } else {
      if (ev.data instanceof ArrayBuffer) {
        log("RECV binary ArrayBuffer: " + ev.data.byteLength + " bytes");
      } else if (ev.data instanceof Blob) {
        log("RECV binary Blob: " + ev.data.size + " bytes");
        // convert Blob → ArrayBuffer agar kode kamu tetap berjalan
        ev.data.arrayBuffer().then(buf => {
          log("RECV binary extracted: " + buf.byteLength + " bytes");
        });
      } else {
        log("RECV unknown binary type");
      }
    }
  };
  ws.onclose = () => log("WebSocket closed");
  ws.onerror = (e) => log("WebSocket error: " + e);
};

document.getElementById("disconnectBtn").onclick = () => {
  if (ws) ws.close();
};

document.getElementById("createChatBtn").onclick = () => {
  if (!ws || ws.readyState !== WebSocket.OPEN) return log("Not connected");
  ws.send(JSON.stringify({
    action: "create_chat",
    deviceToken: localStorage.deviceToken
  }));
  log("Sent create_chat");
};

document.getElementById("sendMsgBtn").onclick = () => {
  if (!ws || ws.readyState !== WebSocket.OPEN) return log("Not connected");
  if (!currentChatId) return log("No chatId. Create chat first.");

  const msg = document.getElementById("msgText").value;
  const payload = { action: "send_message", chatId: currentChatId, deviceToken: localStorage.deviceToken, msg };
  ws.send(JSON.stringify(payload));
  log("Sent send_message");
};

document.getElementById("sendWithFileBtn").onclick = async () => {
  if (!ws || ws.readyState !== WebSocket.OPEN) return log("Not connected");
  if (!currentChatId) return log("No chatId. Create chat first.");

  const fileInput = document.getElementById("fileInput");
  if (!fileInput.files || fileInput.files.length === 0) return log("Choose a file first.");
  const file = fileInput.files[0];
  const msg = document.getElementById("msgWithFile").value;

  const header = {
    action: "send_message_with_attachment",
    chatId: currentChatId,
    deviceToken: localStorage.deviceToken,
    msg,
    filename: file.name,
    filesize: file.size,
    mimetype: file.type
  };
  ws.send(JSON.stringify(header));
  log("Sent header for send_message_with_attachment");

  // Wait for server ready_for_binary response
  const waitForReady = new Promise((resolve, reject) => {
    function onMsg(ev) {
      if (typeof ev.data === "string") {
        try {
          const d = JSON.parse(ev.data);
          if (d.action === "ready_for_binary" && d.messageId) {
            ws.removeEventListener("message", onMsg);
            resolve(d.messageId);
          } else if (d.status === "error") {
            ws.removeEventListener("message", onMsg);
            reject(new Error(d.message || JSON.stringify(d)));
          }
        } catch(e){}
      }
    }
    ws.addEventListener("message", onMsg);
    setTimeout(() => {
      ws.removeEventListener("message", onMsg);
      reject(new Error("timeout waiting ready_for_binary"));
    }, 5000);
  });

  try {
    const messageId = await waitForReady;
    log("Server ready_for_binary, messageId=" + messageId);
    const arrayBuffer = await file.arrayBuffer();
    ws.send(arrayBuffer);
    log("Sent binary data (" + arrayBuffer.byteLength + " bytes)");
  } catch (err) {
    log("Error: " + err.message);
  }
};
</script>
<hr/>

<div>
  <h4>Bot Reply (HTML Render)</h4>
  <div id="replyBox"
       style="min-height:150px; border:1px solid #ccc; padding:10px; background:#fff;">
    <em>Belum ada balasan</em>
  </div>
</div>

</body>
</html>
